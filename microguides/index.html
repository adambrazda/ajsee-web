<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>AJSEE – Micro-guides</title>
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ajsee.cz/microguides/" />
  <meta name="description" content="AJSEE vysvětluje: praktické mikroprůvodce." />
  <meta name="theme-color" content="#0077cc" />
  <link rel="icon" href="/images/logo-ajsee.png" />

  <!-- Canonical pro mikroprůvodce: /microguides/ i /microguides/:slug -->
  <script>
    (function () {
      var origin = 'https://ajsee.cz';
      var params = new URLSearchParams(window.location.search);
      var querySlug = (params.get('slug') || '').trim();

      function safeDecode(value) {
        try {
          return decodeURIComponent(value);
        } catch (e) {
          return value;
        }
      }

      var pathParts = window.location.pathname
        .replace(/\/+$/, '')
        .split('/')
        .filter(Boolean);

      var pathSlug = pathParts[0] === 'microguides' && pathParts[1]
        ? safeDecode(pathParts[1])
        : '';

      var slug = querySlug || pathSlug;

      window.AJSEE_MG_SLUG = slug;

      var canonicalUrl = slug
        ? origin + '/microguides/' + encodeURIComponent(slug)
        : origin + '/microguides/';

      function upsertLink(rel, href) {
        var el = document.querySelector('link[rel="' + rel + '"]');
        if (!el) {
          el = document.createElement('link');
          el.setAttribute('rel', rel);
          document.head.appendChild(el);
        }
        el.setAttribute('href', href);
      }

      function upsertMetaProperty(property, content) {
        var el = document.querySelector('meta[property="' + property + '"]');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute('property', property);
          document.head.appendChild(el);
        }
        el.setAttribute('content', content);
      }

      upsertLink('canonical', canonicalUrl);
      upsertMetaProperty('og:url', canonicalUrl);
    })();
  </script>

  <!-- Prémiové fonty (sjednoceno s ostatními stránkami) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/src/styles/pages/microguides-page.scss" />

  <!-- Nastavení jazyka co nejdříve -->
  <script>
    (function () {
      var supported = ['cs', 'en', 'de', 'sk', 'pl', 'hu'];
      var params = new URLSearchParams(location.search);
      var langParam = params.get('lang');
      var htmlLang = document.documentElement.getAttribute('lang') || 'cs';
      var lang = String(langParam || htmlLang || 'cs').toLowerCase().split(/[-_]/)[0];

      if (lang === 'cz') lang = 'cs';
      if (supported.indexOf(lang) === -1) lang = 'cs';

      document.documentElement.setAttribute('lang', lang);
      window.AJSEE_LANG = lang;

      try {
        document.cookie = 'aj_lang=' + encodeURIComponent(lang) + ';path=/;max-age=' + (60 * 60 * 24 * 365) + ';SameSite=Lax';
        localStorage.setItem('ajsee.lang', lang);
      } catch (e) {}
    })();
  </script>

  <!-- Kill-switch pro paralelní renderery + Impact tracking konfigurace -->
  <script>
    window.__TM_INLINE_DISABLED = true;
    window.__impact = window.__impact || { param: 'irclickid', value: '<SET_YOUR_CLICK_ID>' };
  </script>

  <!-- dataLayer init (pro GA4 i budoucí GTM) + mg_init -->
  <script>
    window.dataLayer = window.dataLayer || [];

    (function () {
      var params = new URLSearchParams(location.search);

      window.dataLayer.push({
        event: 'mg_init',
        pageType: window.AJSEE_MG_SLUG ? 'microguide-detail' : 'microguides-index',
        'mg.slug': window.AJSEE_MG_SLUG || params.get('slug') || '',
        'mg.lang': window.AJSEE_LANG || 'cs'
      });
    })();
  </script>

  <!-- GA4 pouze na HTTPS/produkci -->
  <script>
    (function () {
      var isProdHttps =
        location.protocol === 'https:' &&
        !/localhost|127\.0\.0\.1|0\.0\.0\.0/i.test(location.hostname);

      if (!isProdHttps) return;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-K0ZS0D9JLK';
      script.onload = function () {
        window.dataLayer = window.dataLayer || [];

        function gtag(){ dataLayer.push(arguments); }

        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-K0ZS0D9JLK', {
          page_path: location.pathname + location.search
        });
      };

      document.head.appendChild(script);
    })();
  </script>

  <!-- ✅ JEDINÝ globální vstup AJSEE -->
  <script type="module" src="/src/main.js"></script>
</head>

<body data-page="microguides">
  <header class="site-header"></header>

  <main class="mg" id="mgRoot" data-mg-root hidden>
    <!-- Runtime sem vykreslí breadcrumb, hero, TOC, kroky, mobilní navigaci… -->
    <div id="mg-share" aria-hidden="true"></div>
  </main>

  <!-- COMMENTS: begin (Netlify Forms – registrace při buildu) -->
  <section class="comments" id="comments">
    <h3 class="comments-title" data-i18n-key="comments.title">Komentáře</h3>

    <form
      id="commentForm"
      name="site-comments"
      method="POST"
      data-netlify="true"
      data-netlify-recaptcha="true"
      netlify-honeypot="bot-field"
    >
      <input type="hidden" name="form-name" value="site-comments" />
      <input type="hidden" name="postId" id="commentPostId" value="" />
      <input type="hidden" name="postType" id="commentPostType" value="microguide" />
      <input type="hidden" name="lang" id="commentLang" value="" />

      <p class="hp" hidden>
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <div class="comments-grid">
        <div class="form-row">
          <label for="c_name" data-i18n-key="comments.name">Jméno</label>
          <input
            id="c_name"
            name="name"
            type="text"
            required
            autocomplete="name"
            placeholder="Tvoje jméno"
            data-i18n-placeholder="comments.namePh"
          />
        </div>

        <div class="form-row">
          <label for="c_email" data-i18n-key="comments.email">E-mail</label>
          <input
            id="c_email"
            name="email"
            type="email"
            required
            autocomplete="email"
            placeholder="tvuj@email.cz"
            data-i18n-placeholder="comments.emailPh"
          />
          <small class="hint" data-i18n-key="comments.emailHint">E-mail se nezobrazuje veřejně.</small>
        </div>

        <div class="form-row">
          <label for="c_website" data-i18n-key="comments.website">Web (nepovinné)</label>
          <input
            id="c_website"
            name="website"
            type="url"
            placeholder="https://tvoje-stranka.cz"
            data-i18n-placeholder="comments.websitePh"
          />
          <small class="hint" data-i18n-key="comments.websiteHint">Web se veřejně nezobrazuje.</small>
        </div>

        <div class="form-row form-row--full">
          <label for="c_comment" data-i18n-key="comments.comment">Komentář</label>
          <textarea
            id="c_comment"
            name="comment"
            rows="5"
            required
            placeholder="Napiš svůj komentář…"
            data-i18n-placeholder="comments.commentPh"
          ></textarea>
        </div>

        <div data-netlify-recaptcha="true"></div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" data-i18n-key="comments.submit">Odeslat komentář</button>
          <p class="form-status" id="commentStatus" aria-live="polite"></p>
        </div>
      </div>
    </form>

    <div id="commentsList" class="comments-list" aria-live="polite"></div>
  </section>
  <!-- COMMENTS: end -->

  <noscript>Pro zobrazení mikroprůvodce povol JavaScript.</noscript>

  <footer class="site-footer"></footer>

  <!-- Runtime pro micro-guides -->
  <script type="module" src="/src/mg-runtime.js"></script>

  <!-- Inline init pro komentáře: nastaví lang/postId/postType, načte a odesílá -->
  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const lang =
        (qs.get('lang') || document.documentElement.getAttribute('lang') || 'cs')
          .toLowerCase().split(/[-_]/)[0];

      const currentSlug =
        window.AJSEE_MG_SLUG ||
        qs.get('slug') ||
        location.pathname.replace(/^\/microguides\/?/, '').replace(/\/$/, '') ||
        location.pathname;

      const commentLang = document.getElementById('commentLang');
      const commentPostType = document.getElementById('commentPostType');
      const commentPostId = document.getElementById('commentPostId');

      if (commentLang) commentLang.value = lang;
      if (commentPostType) commentPostType.value = 'microguide';
      if (commentPostId) commentPostId.value = currentSlug;

      const postType = 'microguide';
      const postId = currentSlug;
      const statusEl = document.getElementById('commentStatus');
      const listEl = document.getElementById('commentsList');

      const escape = (value = '') =>
        String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');

      function fmtDate(iso) {
        try {
          const date = new Date(iso);

          return date.toLocaleString(lang, {
            year: 'numeric',
            month: 'short',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch {
          return iso;
        }
      }

      function renderComments(items) {
        if (!listEl) return;

        if (!Array.isArray(items) || !items.length) {
          listEl.innerHTML = '<p class="comments-empty" data-i18n-key="comments.empty">Zatím žádné komentáře.</p>';
          return;
        }

        listEl.innerHTML = items.map(item => `
          <article class="comment-item" data-id="${escape(item.id)}">
            <header class="comment-head">
              <strong class="comment-author">${escape(item.name || 'Anonym')}</strong>
              <time class="comment-date" datetime="${escape(item.createdAt)}">${escape(fmtDate(item.createdAt))}</time>
            </header>
            <div class="comment-body"><p>${escape(item.comment).replace(/\n{2,}/g, '</p><p>').replace(/\n/g, '<br>')}</p></div>
          </article>
        `).join('');
      }

      async function loadComments() {
        if (!listEl) return;

        try {
          const url = new URL('/.netlify/functions/get-comments', location.origin);
          url.searchParams.set('postId', postId);
          url.searchParams.set('postType', postType);
          url.searchParams.set('lang', lang);

          const response = await fetch(url.toString(), {
            headers: { Accept: 'application/json' }
          });

          if (!response.ok) {
            throw new Error('Could not load comments');
          }

          const data = await response.json();
          renderComments(data.items || []);
        } catch {
          // V localhostu může Netlify function vracet 500 – neblokujeme kvůli tomu článek.
          listEl.innerHTML = '<p class="comments-error">Komentáře se v lokálním prostředí nepodařilo načíst.</p>';
        }
      }

      loadComments();

      const form = document.getElementById('commentForm');
      if (!form) return;

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        const formData = new FormData(form);

        if (!formData.get('form-name')) {
          formData.set('form-name', 'site-comments');
        }

        fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(formData).toString()
        })
          .then(() => {
            if (statusEl) {
              statusEl.textContent = lang === 'cs'
                ? 'Díky! Komentář byl odeslán.'
                : 'Thanks! Your comment was submitted.';
            }

            form.reset();
            setTimeout(loadComments, 1200);
          })
          .catch(() => {
            if (statusEl) {
              statusEl.textContent = lang === 'cs'
                ? 'Odeslání se nepodařilo.'
                : 'Submission failed.';
            }
          });
      }, { passive: false });
    })();
  </script>
</body>
</html>
