# netlify.toml

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"


# ------------ Edge Functions ------------
# 1) JSON endpoint pro NearMe fallback (context.geo → JSON)
# Specifická cesta musí být první.
[[edge_functions]]
  function = "geo-lookup"
  path = "/api/geo"

# 2) Cookie middleware podle Geo/IP nebo lang
# Důležité: catch-all nesmí běžet nad assety, obrázky, locale JSONy,
# sitemapou, robots.txt ani technickými soubory.
[[edge_functions]]
  function = "geo-country"
  path = "/*"
  excludedPath = [
    "/api/*",
    "/.netlify/functions/*",
    "/assets/*",
    "/images/*",
    "/locales/*",
    "/content/*",
    "/favicon.ico",
    "/robots.txt",
    "/sitemap.xml",
    "/site.webmanifest",
    "/*.css",
    "/*.js",
    "/*.map",
    "/*.json",
    "/*.png",
    "/*.jpg",
    "/*.jpeg",
    "/*.webp",
    "/*.avif",
    "/*.svg",
    "/*.ico",
    "/*.xml"
  ]


# ------------ HEADERS ------------

# CORS pro Functions + no-store
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept, Authorization"
    Cache-Control                = "no-store"

# /api/geo z Edge: nikdy necacheovat
[[headers]]
  for = "/api/geo"
  [headers.values]
    Cache-Control = "no-store"

# Fingerprintované bundly od Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Locale JSON – lze cacheovat, ale musí se revalidovat
[[headers]]
  for = "/locales/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Microguide content JSON – krátká cache, aby šly rychle promítat změny obsahu
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# HTML nikdy agresivně necacheovat – kořenové *.html
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTML nikdy agresivně necacheovat – index.html v podsložkách
[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap a robots – krátká cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Obrázky
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Základní security hlavičky
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(self), microphone=(), camera=()"


# ------------ REDIRECTS / REWRITES ------------
# SEO princip:
# - veřejná kanonická URL = bez .html
# - .html soubory = interní build artefakty
# - pretty URL se interně rewriteuje na .html přes status 200
# - 301 cleanup pravidla musí být před 200 rewrites
#
# Důležité:
# - neřešíme zde ?lang=cs cleanup, protože předchozí varianta způsobila self-redirecty
# - ?lang=cs dočasně ošetříme přes canonical v HTML
# - soubor public/_redirects musí zůstat odstraněný


# ------------ Homepage cleanup ------------

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true


# ------------ .html → pretty canonical URLs ------------

[[redirects]]
  from = "/accommodation.html"
